apiVersion: apps/v1
kind: Deployment
metadata:
  name: kestra
  labels:
    app: kestra
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: kestra
  template:
    metadata:
      labels:
        app: kestra
    spec:
      containers:
      - name: kestra
        image: kestra/kestra:v1.3.7
        command:
          - bash
          - -c
          - |
            until (echo > /dev/tcp/localhost/5432) 2>/dev/null; do
              echo "Waiting for PostgreSQL sidecar..."
              sleep 2
            done
            sleep 3
            echo "Installing email plugin..."
            /app/kestra plugins install io.kestra.plugin:plugin-email:1.1.1
            echo "Starting Kestra server..."
            exec /app/kestra server standalone --worker-thread=4 --flow-path=/etc/kestra/flows
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: management
          containerPort: 8081
          protocol: TCP
        env:
        - name: SECRET_GMAIL_USERNAME
          valueFrom:
            secretKeyRef:
              name: kestra-secrets
              key: GMAIL_USERNAME
        - name: SECRET_GMAIL_APP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kestra-secrets
              key: GMAIL_APP_PASSWORD
        - name: SECRET_ADMIN_EMAIL
          valueFrom:
            secretKeyRef:
              name: kestra-secrets
              key: ADMIN_EMAIL
        - name: SECRET_AUTHENTIK_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: kestra-secrets
              key: AUTHENTIK_API_TOKEN
        - name: SECRET_WEBHOOK_KEY_NEW_USER_APPROVAL
          valueFrom:
            secretKeyRef:
              name: kestra-secrets
              key: WEBHOOK_KEY_NEW_USER_APPROVAL
        - name: SECRET_WEBHOOK_KEY_USER_APPROVAL_ACTION
          valueFrom:
            secretKeyRef:
              name: kestra-secrets
              key: WEBHOOK_KEY_USER_APPROVAL_ACTION
        - name: KESTRA_CONFIGURATION
          value: |
            datasources:
              postgres:
                url: jdbc:postgresql://localhost:5432/kestra
                driverClassName: org.postgresql.Driver
                username: kestra
                password: kestra
            kestra:
              server:
                basicAuth:
                  enabled: false
              repository:
                type: postgres
              storage:
                type: local
                local:
                  basePath: /app/storage
              queue:
                type: postgres
        volumeMounts:
        - name: kestra-storage
          mountPath: /app/storage
        - name: kestra-tmp
          mountPath: /tmp/kestra
        - name: kestra-flows
          mountPath: /etc/kestra/flows
          readOnly: true
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
      - name: postgres
        image: postgres:17.4-alpine
        ports:
        - name: postgres
          containerPort: 5432
          protocol: TCP
        env:
        - name: POSTGRES_DB
          value: kestra
        - name: POSTGRES_USER
          value: kestra
        - name: POSTGRES_PASSWORD
          value: kestra
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "kestra"]
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: kestra-storage
        nfs:
          server: 192.168.1.10
          path: /mnt/primary/root/config/kestra/storage
          readOnly: false
      - name: kestra-tmp
        emptyDir: {}
      - name: kestra-flows
        configMap:
          name: kestra-flows
      - name: postgres-data
        nfs:
          server: 192.168.1.10
          path: /mnt/primary/root/storage/kestra/postgresql
          readOnly: false
