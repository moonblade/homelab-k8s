apiVersion: apps/v1
kind: Deployment
metadata:
  name: kestra
  labels:
    app: kestra
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kestra
  template:
    metadata:
      labels:
        app: kestra
    spec:
      containers:
      - name: kestra
        image: kestra/kestra:v1.3.7
        command:
          - bash
          - -c
          - exec /app/kestra server standalone --worker-thread=4
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: management
          containerPort: 8081
          protocol: TCP
        env:
        - name: SECRET_GMAIL_USERNAME
          valueFrom:
            secretKeyRef:
              name: kestra-secrets
              key: GMAIL_USERNAME
        - name: SECRET_GMAIL_APP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kestra-secrets
              key: GMAIL_APP_PASSWORD
        - name: SECRET_ADMIN_EMAIL
          valueFrom:
            secretKeyRef:
              name: kestra-secrets
              key: ADMIN_EMAIL
        - name: SECRET_AUTHENTIK_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: kestra-secrets
              key: AUTHENTIK_API_TOKEN
        - name: SECRET_WEBHOOK_KEY_NEW_USER_APPROVAL
          valueFrom:
            secretKeyRef:
              name: kestra-secrets
              key: WEBHOOK_KEY_NEW_USER_APPROVAL
        - name: SECRET_WEBHOOK_KEY_USER_APPROVAL_ACTION
          valueFrom:
            secretKeyRef:
              name: kestra-secrets
              key: WEBHOOK_KEY_USER_APPROVAL_ACTION
        - name: KESTRA_CONFIGURATION
          value: |
            micronaut:
              io:
                watch:
                  enabled: true
                  paths:
                    - /app/flows
                    - /etc/kestra/configmap-flows
            datasources:
              h2:
                url: jdbc:h2:file:/app/db/kestra;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
                driverClassName: org.h2.Driver
                username: sa
                password: ""
            kestra:
              tutorialFlows:
                enabled: false
              repository:
                type: h2
              storage:
                type: local
                local:
                  basePath: /app/storage
              queue:
                type: h2
        volumeMounts:
        - name: kestra-storage
          mountPath: /app/storage
        - name: kestra-db
          mountPath: /app/db
        - name: kestra-tmp
          mountPath: /tmp/kestra
        - name: kestra-flows-dir
          mountPath: /app/flows
        - name: kestra-flows
          mountPath: /etc/kestra/configmap-flows
          readOnly: true
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
      volumes:
      - name: kestra-storage
        nfs:
          server: 192.168.1.10
          path: /mnt/primary/root/config/kestra/storage
          readOnly: false
      - name: kestra-tmp
        emptyDir: {}
      - name: kestra-flows-dir
        emptyDir: {}
      - name: kestra-flows
        configMap:
          name: kestra-flows
      - name: kestra-db
        nfs:
          server: 192.168.1.10
          path: /mnt/primary/root/storage/kestra/db
          readOnly: false
