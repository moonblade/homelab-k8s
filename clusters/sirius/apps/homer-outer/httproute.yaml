apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homer-outer-external
  labels:
    app.kubernetes.io/instance: homer-outer
    app.kubernetes.io/name: homer-outer
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: http
  hostnames:
    - homer.moonblade.work
    - moonblade.work
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: homer-outer
          port: 8080
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: homer-outer-dns
  labels:
    app.kubernetes.io/instance: homer-outer
    app.kubernetes.io/name: homer-outer
spec:
  endpoints:
    - dnsName: homer.moonblade.work
      recordTTL: 60
      recordType: CNAME
      targets:
        - 46b0a967-3b0f-493a-88e7-6f1cc9f8852b.cfargotunnel.com
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: 'true'
    - dnsName: moonblade.work
      recordTTL: 60
      recordType: CNAME
      targets:
        - 46b0a967-3b0f-493a-88e7-6f1cc9f8852b.cfargotunnel.com
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: 'true'
