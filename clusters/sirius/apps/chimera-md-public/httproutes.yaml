apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chimera-md-public-external
  labels:
    app.kubernetes.io/instance: chimera-md-public
    app.kubernetes.io/name: chimera-md-public
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: http
  hostnames:
    - read.moonblade.work
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: chimera-md-public
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chimera-md-public-internal
  labels:
    app.kubernetes.io/instance: chimera-md-public
    app.kubernetes.io/name: chimera-md-public
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - read.sirius.moonblade.work
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: chimera-md-public
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chimera-md-public-internal-redirect
  labels:
    app.kubernetes.io/instance: chimera-md-public
    app.kubernetes.io/name: chimera-md-public
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: http
  hostnames:
    - read.sirius.moonblade.work
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: chimera-md-public-internal-dns
  labels:
    app.kubernetes.io/instance: chimera-md-public
    app.kubernetes.io/name: chimera-md-public
spec:
  endpoints:
    - dnsName: read.sirius.moonblade.work
      recordTTL: 60
      recordType: A
      targets:
        - 192.168.1.201
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: chimera-md-public-external-dns
  labels:
    app.kubernetes.io/instance: chimera-md-public
    app.kubernetes.io/name: chimera-md-public
spec:
  endpoints:
    - dnsName: read.moonblade.work
      recordTTL: 60
      recordType: CNAME
      targets:
        - 46b0a967-3b0f-493a-88e7-6f1cc9f8852b.cfargotunnel.com
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: 'true'
