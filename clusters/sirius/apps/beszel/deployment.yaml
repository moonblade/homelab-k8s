apiVersion: apps/v1
kind: Deployment
metadata:
  name: beszel
  labels:
    app.kubernetes.io/instance: beszel
    app.kubernetes.io/name: beszel
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/instance: beszel
      app.kubernetes.io/name: beszel
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: beszel
        app.kubernetes.io/name: beszel
    spec:
      containers:
        - name: beszel
          image: henrygd/beszel:0.18.7
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          env:
            - name: APP_URL
              value: "https://beszel.moonblade.work"
          volumeMounts:
            - name: data
              mountPath: /beszel_data
          livenessProbe:
            httpGet:
              path: /
              port: 8090
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8090
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: 8090
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: beszel-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: beszel-data
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
