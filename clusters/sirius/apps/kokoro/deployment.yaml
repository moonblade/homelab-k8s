apiVersion: apps/v1
kind: Deployment
metadata:
  name: kokoro
  labels:
    app: kokoro
    app.kubernetes.io/name: kokoro
    app.kubernetes.io/instance: kokoro
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kokoro
  template:
    metadata:
      labels:
        app: kokoro
        app.kubernetes.io/name: kokoro
        app.kubernetes.io/instance: kokoro
    spec:
      containers:
        - name: epubaudio
          image: ghcr.io/moonblade/epubtoaudio:latest # {"$imagepolicy": "kokoro:epubtoaudio"}
          ports:
            - name: http
              containerPort: 3002
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: http://ollama.ollama.svc.cluster.local:11434
            - name: OLLAMA_MODEL
              value: gemma3:4b
            - name: EPUBTOAUDIO_UPLOAD_PATH
              value: /data/input
            - name: EPUBTOAUDIO_OUTPUT_PATH
              value: /data/output
            - name: EPUBTOAUDIO_FINAL_PATH
              value: /ebook-audio
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /voices
              port: 3002
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /voices
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: ebook-audio
              mountPath: /ebook-audio
            - name: data
              mountPath: /data
            - name: jobs
              mountPath: /app/jobs
            - name: voice-mappings
              mountPath: /app/voice_mappings
      volumes:
        - name: ebook-audio
          nfs:
            server: 192.168.1.10
            path: /mnt/primary/root/downloads/ebook-audio
            readOnly: false
        - name: data
          emptyDir: {}
        - name: jobs
          emptyDir: {}
        - name: voice-mappings
          emptyDir: {}
