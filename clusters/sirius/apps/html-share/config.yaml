apiVersion: v1
kind: ConfigMap
metadata:
  name: html-share-config
data:
  nginx.conf: |
    server {
        listen 80;
        server_name _;

        root /data;
        autoindex off;
        index _nonexistent_;

        location = / {
            return 403;
        }

        location ~* /index\.html?$ {
            return 403;
        }

        location ~ ^/(.+\.html)$ {
            try_files /$1 =404;
            default_type text/html;
            add_header Content-Type "text/html; charset=utf-8" always;
        }

        location / {
            return 404;
        }
    }
