apiVersion: v1
kind: ConfigMap
metadata:
  name: html-share-config
data:
  nginx.conf: |
    server {
        listen 80;
        server_name _;

        # Disable directory listing and index files
        autoindex off;
        index _nonexistent_;

        # Block root and index requests
        location = / {
            return 403 "Forbidden";
        }
        location ~* /index\.html?$ {
            return 403 "Forbidden";
        }

        # Only serve .html files from /downloads/misc/
        location ~ ^/(.+\.html)$ {
            # Proxy to FileBrowser raw endpoint
            proxy_pass http://filebrowser.filebrowser.svc.cluster.local/api/raw/downloads/misc/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # FileBrowser proxy auth header
            proxy_set_header X-authentik-username "admin";
            
            # Set correct content type
            default_type text/html;
            add_header Content-Type "text/html; charset=utf-8" always;
        }

        # Block everything else
        location / {
            return 404 "Not Found";
        }
    }
