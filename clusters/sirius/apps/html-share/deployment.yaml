apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-share
spec:
  replicas: 1
  selector:
    matchLabels:
      app: html-share
  template:
    metadata:
      labels:
        app: html-share
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
      volumes:
        - name: config
          configMap:
            name: html-share-config
