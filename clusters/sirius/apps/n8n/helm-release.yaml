apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: n8n
  namespace: n8n
spec:
  interval: 1h0m0s
  chart:
    spec:
      chart: n8n
      version: "1.0.3"
      sourceRef:
        kind: HelmRepository
        name: n8n
        namespace: n8n
  install:
    crds: Create
    timeout: 10m
  upgrade:
    crds: CreateReplace
    timeout: 10m
  values:
    image:
      tag: "2.10.4"
    
    # Standalone mode (SQLite, no external DB/Redis required)
    queueMode:
      enabled: false
    
    # Persistence for SQLite database
    persistence:
      enabled: true
      size: 5Gi
    
    # Resources
    resources:
      main:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2048Mi
    
    # Config
    config:
      timezone: Asia/Calcutta
      extraEnv:
        - name: N8N_PROXY_HOPS
          value: "1"
    
    # Encryption key for credentials
    secret:
      n8n:
        encryptionKey: "cf83e1357eefb8bdf1542850d66d8007d620e4050b5715dc83f4a921d36ce9ce47d0d13c5d85f2b0ff8318d2877eec2f63b931bd47417a81a538327af927da3e"
