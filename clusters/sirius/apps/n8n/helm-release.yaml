apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: n8n
  namespace: n8n
spec:
  interval: 1h0m0s
  chart:
    spec:
      chart: n8n
      version: "1.0.3"
      sourceRef:
        kind: HelmRepository
        name: n8n
        namespace: n8n
  install:
    crds: Create
    timeout: 10m
  upgrade:
    crds: CreateReplace
    timeout: 10m
  values:
    image:
      tag: "2.10.4"
    
    # Standalone mode (SQLite, no external DB/Redis required)
    queueMode:
      enabled: false
    
    database:
      type: sqlite
      useExternal: false
    
    redis:
      enabled: false
    
    # Persistence for SQLite database
    persistence:
      enabled: true
      size: 5Gi
    
    # Resources
    resources:
      main:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2048Mi
    
    # Config
    config:
      timezone: Asia/Calcutta
      extraEnv:
        - name: N8N_PROXY_HOPS
          value: "1"
    
    secretRefs:
      existingSecret: n8n-encryption
      env:
        N8N_ENCRYPTION_KEY: N8N_ENCRYPTION_KEY
