apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
spec:
  interval: 1h0m0s
  chart:
    spec:
      chart: grafana
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: grafana
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password

    persistence:
      enabled: true
      size: 10Gi

    initChownData:
      enabled: false

    securityContext:
      runAsUser: 472
      runAsGroup: 472
      fsGroup: 472

    resources:
      limits:
        memory: 1Gi
        cpu: 500m
      requests:
        memory: 256Mi
        cpu: 100m

    grafana.ini:
      server:
        root_url: https://grafana.moonblade.work
      auth.generic_oauth:
        enabled: true
        name: Authentik
        allow_sign_up: true
        client_id: grafana-homelab-oidc
        client_secret: $__file{/etc/secrets/grafana-oidc/client_secret}
        scopes: openid email profile groups
        auth_url: https://login.moonblade.work/application/o/authorize/
        token_url: https://login.moonblade.work/application/o/token/
        api_url: https://login.moonblade.work/application/o/userinfo/
        role_attribute_path: "contains(groups[*], 'admin') && 'Admin' || 'Viewer'"
        allow_assign_grafana_admin: true
        auto_login: true
      auth:
        disable_login_form: true

    extraSecretMounts:
      - name: grafana-oidc
        secretName: grafana-oidc
        defaultMode: 0440
        mountPath: /etc/secrets/grafana-oidc
        readOnly: true

    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Loki
            type: loki
            access: proxy
            url: http://loki.loki.svc.cluster.local:3100
            isDefault: true
            jsonData:
              maxLines: 1000
          - name: Prometheus
            type: prometheus
            url: http://prometheus-server.prometheus.svc.cluster.local
            access: proxy
            isDefault: false

    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            orgId: 1
            folder: ""
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default
          - name: infra-logs
            orgId: 1
            folder: "Infrastructure"
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/infra-logs
          - name: app-logs
            orgId: 1
            folder: "Applications"
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/app-logs

    dashboardsConfigMaps:
      default: grafana-dashboards
      infra-logs: grafana-dashboard-infra-logs
      app-logs: grafana-dashboard-app-logs
