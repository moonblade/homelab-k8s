        {
          "title": "Log Volume by Namespace",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "loki", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 30, "lineWidth": 1, "stacking": { "mode": "normal" } },
              "unit": "short"
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum by (namespace) (count_over_time({namespace=~\"authentik|cert-manager|external-dns|flux-system|ingress-nginx|kube-system|loki|metallb-system|nginx-gateway|local-path-storage\"}[1m]))",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "title": "Authentik Logs",
          "type": "logs",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 6 },
