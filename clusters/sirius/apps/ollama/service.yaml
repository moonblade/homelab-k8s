# Service without selector -- uses manual Endpoints to point to Ollama on Hermes (Windows VM 202, GPU passthrough)
apiVersion: v1
kind: Service
metadata:
  name: ollama
  labels:
    app.kubernetes.io/instance: ollama
    app.kubernetes.io/name: ollama
spec:
  type: ClusterIP
  ports:
    - port: 11434
      targetPort: 11434
      protocol: TCP
      name: http
---
# Manual Endpoints pointing to Hermes Windows VM (192.168.1.77)
apiVersion: v1
kind: Endpoints
metadata:
  name: ollama
  labels:
    app.kubernetes.io/instance: ollama
    app.kubernetes.io/name: ollama
subsets:
  - addresses:
      - ip: 192.168.1.77
    ports:
      - port: 11434
        protocol: TCP
        name: http
