apiVersion: v1
kind: PersistentVolume
metadata:
  name: ollama-nfs-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: nfs.sirius.local
    path: /mnt/primary/root/storage/ollama
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-nfs
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  resources:
    requests:
      storage: 20Gi
  volumeName: ollama-nfs-pv
