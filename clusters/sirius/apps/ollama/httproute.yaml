# Internal route via local DNS - TLS terminated by Gateway
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ollama-internal
  labels:
    app.kubernetes.io/instance: ollama
    app.kubernetes.io/name: ollama
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - ollama.sirius.moonblade.work
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ollama
          port: 11434
---
# HTTP to HTTPS redirect for internal route
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ollama-internal-redirect
  labels:
    app.kubernetes.io/instance: ollama
    app.kubernetes.io/name: ollama
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: http
  hostnames:
    - ollama.sirius.moonblade.work
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
      matches:
        - path:
            type: PathPrefix
            value: /
---
# Internal DNS endpoint
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: ollama-internal-dns
  labels:
    app.kubernetes.io/instance: ollama
    app.kubernetes.io/name: ollama
spec:
  endpoints:
    - dnsName: ollama.sirius.moonblade.work
      recordTTL: 60
      recordType: A
      targets:
        - 192.168.1.201
