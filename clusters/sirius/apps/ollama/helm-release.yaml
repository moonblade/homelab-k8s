apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: ollama
  namespace: ollama
spec:
  interval: 1h0m0s
  chart:
    spec:
      chart: ollama
      sourceRef:
        kind: HelmRepository
        name: otwld
        namespace: ollama
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    # CPU-only configuration (no GPU)
    ollama:
      gpu:
        enabled: false
      
      # Models to pull at startup
      models:
        pull:
          - gemma4:e2b
    
    # Persistence configuration
    persistentVolume:
      enabled: true
      existingClaim: ollama-nfs
    
    # Resource configuration for CPU (gemma4:e2b needs ~10-12GB RAM)
    resources:
      limits:
        memory: 14Gi
        cpu: 4000m
      requests:
        memory: 10Gi
        cpu: 2000m
    
    # Service configuration
    service:
      type: ClusterIP
      port: 11434