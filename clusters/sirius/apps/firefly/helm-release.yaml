apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: firefly-iii
  namespace: firefly
spec:
  interval: 5m
  timeout: 10m
  install:
    disableHooks: true
    remediation:
      retries: 3
  upgrade:
    disableHooks: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: firefly-iii-stack
      version: "0.9.2"
      sourceRef:
        kind: HelmRepository
        name: firefly-iii
        namespace: firefly
  values:
    firefly-iii:
      persistence:
        enabled: true
        existingClaim: firefly-app-nfs
      config:
        env:
          DB_HOST: "firefly-iii-firefly-db"
          DB_CONNECTION: pgsql
          DB_PORT: "5432"
          DB_DATABASE: firefly
          DB_USERNAME: firefly
          DEFAULT_LANGUAGE: "en_US"
          DEFAULT_LOCALE: "equal"
          TZ: "Asia/Kolkata"
          TRUSTED_PROXIES: "**"
          AUTHENTICATION_GUARD: "remote_user_guard"
          AUTHENTICATION_GUARD_HEADER: "HTTP_X_AUTHENTIK_USERNAME"
          AUTHENTICATION_GUARD_EMAIL: "HTTP_X_AUTHENTIK_EMAIL"
          APP_URL: "https://firefly.moonblade.work"
    firefly-db:
      enabled: true
      storage:
        existingClaim: firefly-db-nfs
    importer:
      enabled: false
