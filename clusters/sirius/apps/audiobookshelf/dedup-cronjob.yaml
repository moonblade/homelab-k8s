apiVersion: batch/v1
kind: CronJob
metadata:
  name: audiobookshelf-dedup
spec:
  schedule: "30 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      template:
        spec:
          containers:
            - name: dedup
              image: python:3.13-alpine
              env:
                - name: ABS_URL
                  value: "http://audiobookshelf.audiobookshelf.svc.cluster.local"
                - name: ABS_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: audiobookshelf-dedup-secret
                      key: api-key
              volumeMounts:
                - name: audiobooks
                  mountPath: /audiobooks
                  mountPropagation: HostToContainer
              command:
                - python3
                - -c
                - |
                  import json, os, shutil
                  from urllib.request import Request, urlopen
                  from collections import defaultdict

                  ABS_URL = os.environ["ABS_URL"]
                  API_KEY = os.environ["ABS_API_KEY"]

                  def api(path, method="GET", data=None):
                      url = f"{ABS_URL}{path}"
                      req = Request(url, method=method)
                      req.add_header("Authorization", f"Bearer {API_KEY}")
                      if data is not None:
                          req.add_header("Content-Type", "application/json")
                          return json.loads(urlopen(req, json.dumps(data).encode()).read())
                      return json.loads(urlopen(req).read())

                  # Get all libraries
                  libraries = api("/api/libraries").get("libraries", [])
                  total_deleted = 0

                  for lib in libraries:
                      lib_id = lib["id"]
                      lib_name = lib["name"]
                      print(f"Checking library: {lib_name} ({lib_id})")

                      items = api(f"/api/libraries/{lib_id}/items?limit=0").get("results", [])

                      # --- Pass 1: Exact path duplicates (scanner race condition) ---
                      by_path = defaultdict(list)
                      for item in items:
                          by_path[item["path"]].append(item)

                      path_delete_ids = []
                      for path, group in by_path.items():
                          if len(group) > 1:
                              # Keep oldest (lowest addedAt), delete rest
                              group.sort(key=lambda x: x.get("addedAt", 0))
                              for dup in group[1:]:
                                  path_delete_ids.append(dup["id"])
                                  print(f"  [path-dup] Removing {dup['id']} at {path}")

                      # --- Pass 2: Same title + same duration, different paths (beets copies) ---
                      by_title_dur = defaultdict(list)
                      # Rebuild items minus path dupes already marked
                      remaining = [i for i in items if i["id"] not in path_delete_ids]
                      for item in remaining:
                          title = item.get("media", {}).get("metadata", {}).get("title", "")
                          duration = int(item.get("media", {}).get("duration", 0))
                          if title and duration > 0:
                              by_title_dur[(title, duration)].append(item)

                      title_delete_ids = []
                      dirs_to_delete = []
                      for (title, dur), group in by_title_dur.items():
                          if len(group) < 2:
                              continue

                          # Score paths: prefer deeper (beets-structured Author/Title)
                          # over shallow (raw download name)
                          def path_depth(item):
                              return item["path"].count("/")

                          group.sort(key=path_depth, reverse=True)
                          keep = group[0]
                          for dup in group[1:]:
                              title_delete_ids.append(dup["id"])
                              dirs_to_delete.append(dup["path"])
                              print(f"  [title-dup] \"{title}\" ({dur}s)")
                              print(f"    Keep: {keep['path']}")
                              print(f"    Delete: {dup['path']}")

                      # --- Execute deletions ---
                      all_delete_ids = path_delete_ids + title_delete_ids
                      if not all_delete_ids:
                          print("  No duplicates found")
                          continue

                      # Delete from ABS database
                      api("/api/items/batch/delete", method="POST",
                          data={"libraryItemIds": all_delete_ids})
                      print(f"  Removed {len(all_delete_ids)} ABS entries")

                      # Delete old directories from disk (only under /audiobooks, never downloads)
                      SAFE_PREFIX = "/audiobooks/"
                      for dir_path in dirs_to_delete:
                          if not dir_path.startswith(SAFE_PREFIX):
                              print(f"  SKIP disk delete (outside {SAFE_PREFIX}): {dir_path}")
                              continue
                          if os.path.isdir(dir_path):
                              shutil.rmtree(dir_path)
                              print(f"  Deleted from disk: {dir_path}")
                          else:
                              print(f"  Not found on disk (already gone): {dir_path}")

                      total_deleted += len(all_delete_ids)

                  print(f"\nDone. Total duplicates removed: {total_deleted}")
          volumes:
            - name: audiobooks
              nfs:
                server: 192.168.1.10
                path: /mnt/primary/root/audiobooks
                readOnly: false
          restartPolicy: OnFailure
