# NOTE: Library watcher must be DISABLED via UI/API when using NFS volumes.
# NFS + inotify causes duplicate book entries during file copy operations.
# The watcher setting is stored in the database (not configurable via env vars).
# Use auto-scan cron (every 2 hours) instead: Settings > Libraries > Audiobooks > Auto-Scan
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: audiobookshelf
  template:
    metadata:
      labels:
        app: audiobookshelf
    spec:
      securityContext:
        fsGroup: 0
      containers:
      - name: audiobookshelf
        image: ghcr.io/advplyr/audiobookshelf:2.31.0
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config
          mountPath: /config
        - name: metadata
          mountPath: /metadata
        - name: thirdaudiobooks
          mountPath: /audiobooks
          mountPropagation: HostToContainer
        - name: ebook-audio
          mountPath: /ebook-audio
          mountPropagation: HostToContainer
        env:
        - name: TZ
          value: America/Toronto
        readinessProbe:
          exec:
            command: ["test", "-f", "/config/DONOTDELETE"]
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: config
        nfs:
          server: 192.168.1.10
          path: /mnt/primary/root/config/audiobookshelf
          readOnly: false
      - name: metadata
        nfs:
          server: 192.168.1.10
          path: /mnt/primary/root/config/audiobookshelf-metadata
          readOnly: false
      - name: thirdaudiobooks
        nfs:
          server: 192.168.1.10
          path: /mnt/primary/root/audiobooks
          readOnly: false
      - name: ebook-audio
        nfs:
          server: 192.168.1.10
          path: /mnt/primary/root/downloads/ebook-audio
          readOnly: false
