apiVersion: v1
kind: Namespace
metadata:
  name: open-webui
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: open-webui
  namespace: open-webui
spec:
  path: clusters/sirius/apps/open-webui
  interval: 15m
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: open-webui
