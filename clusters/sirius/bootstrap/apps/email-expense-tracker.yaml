apiVersion: v1
kind: Namespace
metadata:
  name: email-expense-tracker
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: email-expense-tracker
  namespace: email-expense-tracker
spec:
  path: clusters/sirius/apps/email-expense-tracker
  interval: 15m
  prune: true
  wait: true
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: email-expense-tracker
