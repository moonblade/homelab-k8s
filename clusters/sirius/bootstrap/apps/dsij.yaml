apiVersion: v1
kind: Namespace
metadata:
  name: dsij
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dsij
  namespace: dsij
spec:
  path: clusters/sirius/apps/dsij
  interval: 15m
  prune: true
  wait: true
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
