apiVersion: v1
kind: Namespace
metadata:
  name: beszel
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: beszel
  namespace: beszel
spec:
  path: clusters/sirius/apps/beszel
  interval: 15m
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: beszel
