apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: promtail
  namespace: loki
spec:
  path: clusters/sirius/infra/promtail
  interval: 15m
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: loki
  healthChecks:
    - apiVersion: apps/v1
      kind: DaemonSet
      name: promtail
