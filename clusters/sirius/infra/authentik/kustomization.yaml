apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: authentik
resources:
  - ../../../../base/infra/authentik/
  - ./dnsendpoint.yaml
  - ./secret-sealed.yaml
  - ./referencegrants.yaml
  - ./httproute.yaml
  - ./nfs-volumes.yaml

configMapGenerator:
  - name: authentik-blueprints
    options:
      disableNameSuffixHash: true
    files:
      - ./blueprints/01-policies.yaml
      - ./blueprints/02-groups.yaml
      - ./blueprints/03-stages.yaml
      - ./blueprints/04-flows.yaml
      - ./blueprints/05-source-google.yaml
      - ./blueprints/06-notification-new-user.yaml
      - ./blueprints/10-app-feeder.yaml
      - ./blueprints/10-app-audiobooksearch.yaml
      - ./blueprints/10-app-jackett.yaml
      - ./blueprints/10-app-yts-search.yaml
      - ./blueprints/10-app-filebrowser.yaml
      - ./blueprints/10-app-deaddrop.yaml
      - ./blueprints/10-app-weave.yaml
      - ./blueprints/10-app-audiobookshelf.yaml
      - ./blueprints/10-app-stremio.yaml
      - ./blueprints/10-app-jitsi.yaml
      - ./blueprints/10-app-kestra.yaml

patchesStrategicMerge:
  - helm-release.yaml

