# NFS PersistentVolumes and PersistentVolumeClaims for Authentik PostgreSQL and Redis
# Data migrated from local-path PVCs to TrueNAS NFS at /mnt/primary/root/storage/authentik

---
# PostgreSQL PersistentVolume (NFS)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: authentik-postgresql-nfs-pv
spec:
  capacity:
    storage: 8Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 192.168.29.10
    path: /mnt/primary/root/storage/authentik/postgresql

---
# PostgreSQL PersistentVolumeClaim
# Named to match what the Bitnami PostgreSQL subchart expects
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-authentik-postgresql-0
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  resources:
    requests:
      storage: 8Gi
  volumeName: authentik-postgresql-nfs-pv

---
# Redis PersistentVolume (NFS)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: authentik-redis-nfs-pv
spec:
  capacity:
    storage: 8Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 192.168.29.10
    path: /mnt/primary/root/storage/authentik/redis

---
# Redis PersistentVolumeClaim
# Named to match what the Bitnami Redis subchart expects
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data-authentik-redis-master-0
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  resources:
    requests:
      storage: 8Gi
  volumeName: authentik-redis-nfs-pv
