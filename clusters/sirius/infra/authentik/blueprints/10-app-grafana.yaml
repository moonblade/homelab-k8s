# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: app-grafana
  labels:
    blueprints.goauthentik.io/description: "Grafana OAuth2 application"
entries:
  - model: authentik_providers_oauth2.scopemapping
    id: grafana-email-scope
    state: present
    identifiers:
      name: "Grafana Email Mapping (verified)"
    attrs:
      name: "Grafana Email Mapping (verified)"
      scope_name: email
      expression: |
        return {
            "email": request.user.email,
            "email_verified": True
        }

  - model: authentik_providers_oauth2.scopemapping
    id: grafana-groups-scope
    state: present
    identifiers:
      name: "Grafana Groups Mapping"
    attrs:
      name: "Grafana Groups Mapping"
      scope_name: groups
      expression: |
        roles = request.user.attributes.get("roles", [])
        groups = [group.name for group in request.user.ak_groups.all()]
        return {
            "groups": roles + groups
        }

  - model: authentik_providers_oauth2.oauth2provider
    id: grafana-provider
    state: present
    identifiers:
      name: Provider for Grafana
    attrs:
      name: Provider for Grafana
      client_id: grafana-homelab-oidc
      client_secret: !Env GRAFANA_CLIENT_SECRET
      client_type: confidential
      sub_mode: user_email
      redirect_uris:
        - url: https://grafana.moonblade.work/login/generic_oauth
          matching_mode: strict
        - url: https://grafana.sirius.moonblade.work/login/generic_oauth
          matching_mode: strict
      access_token_validity: minutes=5
      refresh_token_validity: days=30
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      authentication_flow: !Find [authentik_flows.flow, [slug, google-login]]
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-explicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'openid'"]]
        - !KeyOf grafana-email-scope
        - !KeyOf grafana-groups-scope
        - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'profile'"]]

  - model: authentik_core.application
    id: grafana-app
    state: present
    identifiers:
      slug: grafana
    attrs:
      name: Grafana
      slug: grafana
      provider: !KeyOf grafana-provider
      policy_engine_mode: any

  - model: authentik_policies.policybinding
    id: grafana-policy-binding
    state: present
    identifiers:
      order: 0
      target: !KeyOf grafana-app
    attrs:
      policy: !Find [authentik_policies_expression.expressionpolicy, [name, "Has role \"admin\""]]
      target: !KeyOf grafana-app
      order: 0
      enabled: true
      timeout: 30
