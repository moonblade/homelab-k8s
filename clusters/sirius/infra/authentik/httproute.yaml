# External: login.moonblade.work via Cloudflare tunnel → authentik-server
# Authentik is the SSO provider, routes directly to authentik-server service

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: login-authentik-external
  namespace: authentik
spec:
  parentRefs:
  - name: main-gateway
    namespace: nginx-gateway
    sectionName: http
  hostnames:
  - login.moonblade.work
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: authentik-server
      port: 80
