apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: promtail
  namespace: loki
spec:
  interval: 5m
  chart:
    spec:
      chart: promtail
      version: '6.16.4'
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: loki
      interval: 1m
  values:
    config:
      clients:
        - url: http://loki.loki.svc.cluster.local:3100/loki/api/v1/push
      snippets:
        pipelineStages:
          - cri: {}
    tolerations:
      - operator: Exists
        effect: NoSchedule
